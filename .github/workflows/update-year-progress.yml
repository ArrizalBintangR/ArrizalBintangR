name: Update Year Progress

on:
  schedule:
    # 00:05 WIB (UTC+7) = 17:05 UTC (previous day)
    - cron: "5 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-year-progress:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update year progress in README
        run: node scripts/update-year-progress.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update year progress"
          git push
